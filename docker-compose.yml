services:
  db:
    image: postgres:16-alpine
    container_name: poke-investor-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: poke
      POSTGRES_PASSWORD: poke
      POSTGRES_DB: poke_investor
    volumes:
      - poke_investor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poke -d poke_investor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  poke_investor_pgdata:
